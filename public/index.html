<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <!-- Favicons (multi-size with cache-busting v1) -->
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>favicon-16x16.png?v=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>favicon-32x32.png?v=1" />
    <link rel="icon" type="image/png" sizes="48x48" href="<%= BASE_URL %>favicon-48x48.png?v=1" />
    <link rel="icon" type="image/png" sizes="96x96" href="<%= BASE_URL %>favicon-96x96.png?v=1" />
    <link rel="icon" type="image/png" sizes="192x192" href="<%= BASE_URL %>favicon-192x192.png?v=1" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>apple-touch-icon.png?v=1" />

    <!-- Fallback .ico -->
    <link rel="shortcut icon" href="<%= BASE_URL %>favicon.ico?v=1" />

    <title>MKonnect Admin</title>
  </head>
  <body>
    <noscript>
      <strong>
        We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly
        without JavaScript enabled. Please enable it to continue.
      </strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
